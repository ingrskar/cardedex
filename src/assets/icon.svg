<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" />

  <!-- Card outline -->
  <rect x="30" y="40" width="140" height="120" rx="12" fill="#0D1117" stroke="#FFD500" stroke-width="3"/>
  
  <!-- Lightning accent (Pokémon-inspired) -->
  <path d="M70 50 L90 90 L60 90 L80 150" stroke="#FFDE00" stroke-width="4" fill="none"/>

  <!-- Neon data lines -->
  <line x1="40" y1="60" x2="160" y2="60" stroke="#0ff" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="40" y1="140" x2="160" y2="140" stroke="#0ff" stroke-width="1" stroke-dasharray="4 3"/>
  
  <!-- Circles hinting at Pokéball or search nodes -->
  <circle cx="50" cy="120" r="6" fill="#FF0000"/>
  <circle cx="150" cy="80" r="6" fill="#0070FF"/>
</svg>
